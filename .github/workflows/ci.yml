name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lockfiles-in-sync:
    name: Plugin lockfiles in sync with manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      # Pin uv: --exclude-newer freezes version selection but not uv's lockfile
      # output formatting, so an unpinned uv could flap the --check byte compare.
      - name: Install uv
        run: pip install "uv==0.11.17"
      - name: Check lockfiles
        run: python scripts/lock-deps.py --check

  registry-in-sync:
    name: registry.json in sync with manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Regenerate registry
        run: |
          python scripts/build-registry.py
          python scripts/gen_registry.py
      - name: Assert registry committed up to date
        run: |
          if ! git diff --exit-code -- registry.json; then
            echo "::error::registry.json is stale. Run scripts/build-registry.py then scripts/gen_registry.py and commit."
            exit 1
          fi
