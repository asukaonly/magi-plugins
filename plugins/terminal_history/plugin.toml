[plugin]
id = "terminal-history"
name = "Terminal History"
name_i18n = { "zh-CN" = "终端历史" }
version = "0.1.1"
description = "Reads your shell command history so Magi can understand your development workflow, tools used, and technical habits."
description_i18n = { "zh-CN" = "读取 Shell 命令历史，帮助 Magi 了解你的开发工作流、常用工具和技术操作习惯" }
author = "Magi Team"
entry_module = "plugin"
entry_class = "TerminalHistoryPlugin"
official = true
contribution_types = ["sensor"]
platforms = ["macos"]

[plugin.default_settings.sensors.terminal_history]
enabled = false
sync_interval_minutes = 15
initial_sync_policy = "lookback_days"
initial_sync_lookback_days = 7
initial_sync_configured = false
sensitive_mode = "redact"
sensitive_keywords = []
dedup_window_seconds = 60
default_retention_mode = "analyze_only"
[plugin.suggestion_descriptor]
category = "terminal"
platform_support = ["darwin"]
setup_time_estimate_seconds = 10
data_locality = "local_only"

[plugin.suggestion_descriptor.triggers]
intents = []
entities = []

[plugin.suggestion_descriptor.triggers.keywords]
zh = ["命令", "终端", "敲了什么", "跑过什么命令", "shell"]
en = ["terminal", "command", "shell", "ran", "cli"]

[plugin.suggestion_descriptor.rationale]
zh = "magi 能看到你最近敲过哪些命令"
en = "Lets magi see your recent terminal commands"

[[plugin.suggestion_descriptor.local_requirements]]
check_kind = "file_exists"

[plugin.suggestion_descriptor.local_requirements.paths_per_platform]
darwin = "~/.zsh_history"

[[plugin.permissions.capabilities]]
capability = "filesystem_read"
scope = ["~/.zsh_history", "~/.bash_history", "~/.local/share/fish"]
reason_i18n = { en = "Read your shell command history files", "zh-CN" = "读取你的 shell 命令历史文件" }
