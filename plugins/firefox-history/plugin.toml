[plugin]
id = "firefox-history"
name = "Firefox History"
name_i18n = { "zh-CN" = "Firefox 浏览历史" }
version = "0.1.0"
description = "Reads your local Firefox browsing history so Magi can understand your interests, research habits, and frequently visited sites."
description_i18n = { "zh-CN" = "读取本地 Firefox 浏览记录，帮助 Magi 了解你的兴趣方向、研究习惯和常访站点" }
author = "Magi Team"
entry_module = "plugin"
entry_class = "FirefoxHistoryPlugin"
official = true
contribution_types = ["sensor"]
depends_on = ["browser_history_core"]
platforms = ["windows", "macos"]

[plugin.suggestion_descriptor]
category = "browser_history"
platform_support = ["darwin", "win32"]
setup_time_estimate_seconds = 15
data_locality = "local_only"

[plugin.suggestion_descriptor.triggers]
intents = []
entities = []

[plugin.suggestion_descriptor.triggers.keywords]
zh = ["浏览", "上网", "看过", "网页", "网站", "搜过"]
en = ["browsing", "browser", "website", "online", "bookmark"]

[plugin.suggestion_descriptor.rationale]
zh = "magi 能读取你的 Firefox 浏览历史"
en = "Lets magi see your Firefox browsing history"

[[plugin.suggestion_descriptor.local_requirements]]
check_kind = "file_exists"

[plugin.suggestion_descriptor.local_requirements.paths_per_platform]
darwin = "~/Library/Application Support/Firefox/Profiles"
win32 = "%APPDATA%/Mozilla/Firefox/Profiles"

[[plugin.permissions.capabilities]]
capability = "filesystem_read"
scope = ["~/Library/Application Support/Firefox", "%APPDATA%\\Mozilla\\Firefox"]
reason_i18n = { en = "Read the local Firefox history database", "zh-CN" = "读取本地 Firefox 历史数据库" }
