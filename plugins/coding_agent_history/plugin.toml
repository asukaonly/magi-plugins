[plugin]
id = "coding_agent_history"
name = "Agent History"
name_i18n = { "zh-CN" = "Agent 历史" }
icon = "lucide:bot"
version = "0.1.2"
description = "Optional. Reads ONLY your own messages from local agent transcripts (Claude Code, Codex) so Magi can learn what you build. Off by default; obvious secrets are scrubbed before anything leaves your device."
description_i18n = { "zh-CN" = "可选。仅读取本地 Agent（Claude Code、Codex）transcript 里你自己发的消息，让 Magi 了解你在做什么。默认关闭；明显的密钥会在内容离开本机前先被脱敏。" }
author = "Magi Team"
entry_module = "plugin"
entry_class = "CodingAgentHistoryPlugin"
official = false
contribution_types = ["sensor"]
platforms = ["macos", "windows", "linux"]

[plugin.default_settings.sensors.claude_code_agent_history]
enabled = false
source_paths = ["~/.claude/projects"]
initial_sync_lookback_days = 30
sync_interval_minutes = 30
initial_sync_configured = false

[plugin.default_settings.sensors.codex_agent_history]
enabled = false
source_paths = ["~/.codex"]
initial_sync_lookback_days = 30
sync_interval_minutes = 30
initial_sync_configured = false

[plugin.suggestion_descriptor]
category = "code_activity"
platform_support = ["darwin", "win32", "linux"]
setup_time_estimate_seconds = 20
data_locality = "local_only"

[plugin.suggestion_descriptor.triggers]
intents = []
entities = []

[plugin.suggestion_descriptor.triggers.keywords]
zh = ["claude code", "codex", "agent", "ai 编程", "写代码", "做了什么", "在搞什么", "项目"]
en = ["claude code", "codex", "agent", "coding agent", "ai coding", "building", "working on", "side project"]

[plugin.suggestion_descriptor.rationale]
zh = "让 magi 了解你在 Agent 会话里做了什么"
en = "Lets magi learn what you're building with your agents"

# Only recommend when the user actually has coding-agent transcripts.
# local_requirements are AND-combined, so gate on Claude Code's dir (the common
# case); Codex-only users can still install from settings/marketplace.
[[plugin.suggestion_descriptor.local_requirements]]
check_kind = "file_exists"

[plugin.suggestion_descriptor.local_requirements.paths_per_platform]
darwin = "~/.claude/projects"
win32 = "%USERPROFILE%/.claude/projects"
linux = "~/.claude/projects"

[[plugin.permissions.capabilities]]
capability = "filesystem_read"
reason_i18n = { en = "Read your own turns from local agent transcripts", "zh-CN" = "读取本地 Agent transcript 中你自己发送的消息" }
