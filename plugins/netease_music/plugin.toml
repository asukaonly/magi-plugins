[plugin]
id = "netease-music"
name = "NetEase Cloud Music"
name_i18n = { "zh-CN" = "网易云音乐" }
version = "0.1.2"
description = "Reads your NetEase Cloud Music listening history so Magi can understand your music taste and listening habits."
description_i18n = { "zh-CN" = "读取网易云音乐的收听记录，帮助 Magi 了解你的音乐喜好和收听习惯" }
author = "Magi Team"
entry_module = "plugin"
entry_class = "NeteaseMusicPlugin"
official = true
platforms = ["macos", "windows"]
contribution_types = ["sensor"]
[plugin.suggestion_descriptor]
category = "music"
platform_support = ["darwin", "win32"]
setup_time_estimate_seconds = 15
# Not local-only: when a Last.fm API key is configured the sensor sends the
# played artist/track to ws.audioscrobbler.com to fetch genre tags.
data_locality = "uploads"

[plugin.suggestion_descriptor.triggers]
intents = []
entities = []

[plugin.suggestion_descriptor.triggers.keywords]
zh = ["音乐", "听歌", "歌单", "最近听了什么", "单曲循环", "网易云"]
en = ["music", "listening", "songs", "playlist", "netease"]

[plugin.suggestion_descriptor.rationale]
zh = "magi 能看到你最近在听什么音乐"
en = "Lets magi see what you've been listening to"

[[plugin.suggestion_descriptor.local_requirements]]
check_kind = "file_exists"

[plugin.suggestion_descriptor.local_requirements.paths_per_platform]
darwin = "~/Library/Containers/com.netease.163music/Data/Documents/storage/sqlite_storage.sqlite3"
win32 = "%LOCALAPPDATA%/NetEase/CloudMusic/Library/webdb.dat"

[[plugin.permissions.capabilities]]
capability = "filesystem_read"
scope = ["~/Library/Containers/com.netease.163music"]
reason_i18n = { en = "Read the NetEase Music local play history", "zh-CN" = "读取网易云音乐本地播放历史" }
