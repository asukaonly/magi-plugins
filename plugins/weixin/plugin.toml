[plugin]
id = "weixin"
name = "Weixin"
name_i18n = { "zh-CN" = "微信" }
version = "0.2.5"
description = "Connects Magi to Weixin through the official iLink bot gateway for direct chat messages."
description_i18n = { "zh-CN" = "通过微信官方 iLink 机器人网关接入 Magi，让你可以直接在微信里与 Magi 对话" }
author = "Magi Team"
entry_module = "plugin"
entry_class = "WeixinPlugin"
official = true
contribution_types = ["channel"]
platforms = ["windows", "macos"]
dependencies = ["segno>=1.6.1", "cryptography>=42.0.0", "Pillow>=10.0.0"]

[[plugin.permissions.capabilities]]
capability = "network"
reason_i18n = { en = "Connect to the iLink bot gateway", "zh-CN" = "连接 iLink 机器人网关" }
