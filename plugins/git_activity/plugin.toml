[plugin]
id = "git-activity"
name = "Git Activity"
name_i18n = { "zh-CN" = "Git 活动" }
version = "0.1.1"
description = "Tracks your Git commits and repository checkouts so Magi can understand your coding projects and development workflow."
description_i18n = { "zh-CN" = "追踪 Git 提交和分支操作，帮助 Magi 了解你的开发项目和工作流" }
author = "Magi Team"
entry_module = "plugin"
entry_class = "GitActivityPlugin"
official = true
contribution_types = ["sensor"]
platforms = ["macos", "windows"]
