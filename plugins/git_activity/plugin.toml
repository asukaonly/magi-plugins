[plugin]
id = "git-activity"
name = "Git Activity"
name_i18n = { "zh-CN" = "Git 活动" }
version = "0.1.0"
description = "Tracks your Git commits and repository checkouts so Magi can understand your coding projects and development workflow."
description_i18n = { "zh-CN" = "追踪 Git 提交和分支操作，帮助 Magi 了解你的开发项目和工作流" }
author = "Magi Team"
entry_module = "plugin"
entry_class = "GitActivityPlugin"
official = true
contribution_types = ["sensor"]
platforms = ["macos", "windows"]

[plugin.default_settings.sensors.git_activity]
enabled = false
repos = []
sync_interval_minutes = 30
initial_sync_policy = "lookback_days"
initial_sync_lookback_days = 30
sensitive_mode = "redact"
sensitive_keywords = []
default_retention_mode = "analyze_only"

[plugin.suggestion_descriptor]
category = "code_activity"
platform_support = ["darwin", "win32"]
setup_time_estimate_seconds = 15
data_locality = "local_only"

[plugin.suggestion_descriptor.triggers]
intents = []
entities = []

[plugin.suggestion_descriptor.triggers.keywords]
zh = ["代码", "提交", "commit", "改了什么", "项目", "仓库", "repo", "git", "写了什么"]
en = ["code", "commit", "changed", "repo", "repository", "project", "git", "pull request"]

[plugin.suggestion_descriptor.rationale]
zh = "magi 能看到你的代码改动和项目进度"
en = "Lets magi see what you've been building"

[[plugin.suggestion_descriptor.local_requirements]]
check_kind = "executable_in_path"
names = ["git", "git.exe"]
