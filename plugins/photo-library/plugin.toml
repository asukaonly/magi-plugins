[plugin]
id = "photo-library"
name = "Photo Library"
name_i18n = {"zh-CN" = "照片库"}
version = "1.1.0"
description = "Scans your local photo library and reads metadata (time, location, camera) so Magi can build a record of your experiences and places visited."
description_i18n = {"zh-CN" = "扫描本地照片，读取拍摄时间、地点等元数据，帮助 Magi 还原你的生活记录和去过的地方"}
author = "Magi Team"
entry_module = "plugin"
entry_class = "PhotoLibraryPlugin"
official = true
contribution_types = ["sensor"]
