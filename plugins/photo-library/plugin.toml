[plugin]
id = "photo-library"
name = "Photo Library"
name_i18n = { "zh-CN" = "照片库" }
version = "0.1.0"
description = "Scans your local photo library and reads metadata (time, location, camera) so Magi can build a record of your experiences and places visited."
description_i18n = { "zh-CN" = "扫描本地照片，读取拍摄时间、地点等元数据，帮助 Magi 还原你的生活记录和去过的地方" }
author = "Magi Team"
entry_module = "plugin"
entry_class = "PhotoLibraryPlugin"
official = true
contribution_types = ["sensor", "tool"]
platforms = ["macos", "windows"]

[plugin.default_settings.sensors.photo_library]
enabled = false
sync_mode = "manual"
sync_interval_minutes = 60
default_retention_mode = "analyze_only"
storage_mode = "external_reference"
source_paths = []
exclude_patterns = []
analysis_features = ["exif"]
edge_whitelist = ["CAPTURED", "RELATED_TO", "INTERACTED_WITH", "CREATED"]

[plugin.suggestion_descriptor]
category = "photos"
platform_support = ["darwin", "win32"]
setup_time_estimate_seconds = 20
data_locality = "local_only"

[plugin.suggestion_descriptor.triggers]
intents = []
entities = []

[plugin.suggestion_descriptor.triggers.keywords]
zh = ["照片", "图片", "拍", "相册", "拍过", "那张", "影像", "图像"]
en = ["photo", "picture", "image", "photos", "snapshot", "album"]

[plugin.suggestion_descriptor.rationale]
zh = "magi 能看到你的照片和最近的瞬间"
en = "Lets magi see your photos and recent moments"

[[plugin.suggestion_descriptor.local_requirements]]
check_kind = "file_exists"

[plugin.suggestion_descriptor.local_requirements.paths_per_platform]
darwin = "~/Pictures"
win32 = "%USERPROFILE%/Pictures"

[[plugin.permissions.capabilities]]
capability = "photos"
reason_i18n = { en = "Access your photo library and its metadata", "zh-CN" = "访问你的照片库及其元数据" }

[[plugin.permissions.capabilities]]
capability = "filesystem_read"
scope = ["~/Pictures"]
reason_i18n = { en = "Scan local photo files for metadata", "zh-CN" = "扫描本地照片文件的元数据" }
