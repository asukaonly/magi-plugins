[plugin]
id = "edge-history"
name = "Edge History"
name_i18n = { "zh-CN" = "Edge 浏览器历史" }
icon = "lucide:globe"
version = "0.1.1"
description = "Reads your local Microsoft Edge browsing history so Magi can understand your interests, research habits, and frequently visited sites."
description_i18n = { "zh-CN" = "读取本地 Microsoft Edge 浏览记录，帮助 Magi 了解你的兴趣方向、研究习惯和常访站点" }
author = "Magi Team"
entry_module = "plugin"
entry_class = "EdgeHistoryPlugin"
official = true
contribution_types = ["sensor"]
depends_on = ["browser_history_core"]
platforms = ["windows"]

[plugin.display_group]
id = "browser_history"
name = "Browser History"
name_i18n = { "zh-CN" = "浏览器历史" }
description = "Manage browser history sources from installed browser plugins."
description_i18n = { "zh-CN" = "统一管理浏览器历史入口。" }
icon = "lucide:globe"
order = 10
member_label = "Edge"
member_label_i18n = { "zh-CN" = "Edge" }
member_order = 40

[plugin.suggestion_descriptor]
category = "browser_history"
platform_support = ["win32"]
setup_time_estimate_seconds = 10
data_locality = "local_only"

[plugin.suggestion_descriptor.triggers]
intents = []
entities = []

[plugin.suggestion_descriptor.triggers.keywords]
zh = ["浏览", "上网", "看过", "网页", "网站", "搜过"]
en = ["browsing", "browser", "website", "online", "bookmark", "browsed"]

[plugin.suggestion_descriptor.rationale]
zh = "magi 能读取你的 Edge 浏览器历史"
en = "Lets magi see your Edge browsing history"

[[plugin.suggestion_descriptor.local_requirements]]
check_kind = "file_exists"

[plugin.suggestion_descriptor.local_requirements.paths_per_platform]
win32 = "%LOCALAPPDATA%/Microsoft/Edge/User Data/Default/History"

[[plugin.permissions.capabilities]]
capability = "filesystem_read"
scope = ["%LOCALAPPDATA%\\Microsoft\\Edge"]
reason_i18n = { en = "Read the local Edge history database", "zh-CN" = "读取本地 Edge 历史数据库" }
