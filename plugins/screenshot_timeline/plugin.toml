[plugin]
id = "screenshot_timeline"
name = "Screenshot Timeline"
name_i18n = { "zh-CN" = "屏幕快照时间线" }
icon = "lucide:monitor"
version = "0.5.2"
description = "Local-only screen capture (opt-in, off by default): extracts on-screen text into magi's memory. Captures stay on your Mac, are never uploaded, and auto-delete after 30 days."
description_i18n = { "zh-CN" = "纯本地截屏（默认关闭、需手动开启）：提取屏幕文本接入 magi 记忆。截图只留在本机、绝不上传，30 天后自动删除。" }
author = "Magi Team"
entry_module = "plugin"
entry_class = "ScreenshotTimelinePlugin"
official = true
data_locality = "local_only"
contribution_types = ["sensor", "tool"]
platforms = ["macos"]
min_sdk_version = "0.1.0"
dependencies = [
    "pyobjc-framework-Cocoa>=10.0",
]

[plugin.helper]
binary_relative_path = "bin/magi-vision-helper"

[plugin.permissions]
memory_access = ["write_l1"]

[plugin.default_settings.sensors.screenshot_timeline]
enabled = false
capture_scope = "hybrid"
active_window_interval_sec = 10
full_screen_interval_min = 5
ocr_languages = ["zh-Hans", "en-US"]
ocr_level = "accurate"
ax_enabled = true
ax_wake = true
ax_min_content_chars = 80
ax_min_content_nodes = 5
original_retention_days = 30
keyboard_triggers_enabled = false
keyboard_trigger_types = ["scroll", "arrow", "space", "delete"]
app_blocklist = [
    "com.agilebits.onepassword*",
    "com.1password.1password*",
    "com.bitwarden.desktop",
    "com.apple.keychainaccess",
    "com.lastpass.LastPassMacDesktop",
    "com.dashlane.*",
    "com.apple.SecurityAgent",
]
window_title_blocklist = []
panic_hotkey = "Option+Shift+P"
panic_pause_seconds = 60
gap_minutes = 5
max_minutes = 30
thumbnail_max_width = 1024
jpeg_quality_original = 80
jpeg_quality_thumbnail = 70
initial_sync_configured = false
sync_mode = "interval"
[plugin.suggestion_descriptor]
category = "screen_context"
platform_support = ["darwin"]
setup_time_estimate_seconds = 10
data_locality = "local_only"

[plugin.suggestion_descriptor.triggers]
intents = []
entities = []

[plugin.suggestion_descriptor.triggers.keywords]
zh = ["截图", "屏幕", "屏幕上", "刚才在看", "看到了什么"]
en = ["screenshot", "screen", "on screen", "what was on my screen"]

[plugin.suggestion_descriptor.rationale]
zh = "magi 能看到你屏幕上发生了什么"
en = "Lets magi see what's on your screen"

[[plugin.permissions.capabilities]]
capability = "screen_recording"
reason_i18n = { en = "Capture screenshots of your screen", "zh-CN" = "截取你的屏幕画面" }

[[plugin.permissions.capabilities]]
capability = "accessibility"
optional = true
reason_i18n = { en = "Read window content via the accessibility tree (cleaner than OCR) + active-window context (optional)", "zh-CN" = "通过辅助功能树读取窗口内容（比 OCR 更干净）及活动窗口上下文（可选）" }

[[plugin.permissions.capabilities]]
capability = "filesystem_write"
scope = ["~/.magi"]
reason_i18n = { en = "Save screenshots and thumbnails", "zh-CN" = "保存截图与缩略图" }

[[plugin.permissions.capabilities]]
capability = "subprocess"
scope = ["magi-vision-helper"]
reason_i18n = { en = "Run the bundled OCR/vision helper", "zh-CN" = "运行随附的 OCR/视觉助手" }
