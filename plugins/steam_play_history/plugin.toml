[plugin]
id = "steam-play-history"
name = "Steam Play History"
name_i18n = { "zh-CN" = "Steam 游玩历史" }
icon = "brand:steam"
version = "0.1.0"
description = "Infers Steam gameplay sessions from local Steam files and playtime changes."
description_i18n = { "zh-CN" = "根据本地 Steam 文件和游玩时长变化推断游戏会话" }
author = "Magi Team"
entry_module = "plugin"
entry_class = "SteamPlayHistoryPlugin"
official = true
contribution_types = ["sensor"]
platforms = ["windows", "macos", "linux"]
[plugin.suggestion_descriptor]
category = "gaming"
platform_support = ["win32", "darwin", "linux"]
setup_time_estimate_seconds = 15
data_locality = "local_only"

[plugin.suggestion_descriptor.triggers]
intents = []
entities = []

[plugin.suggestion_descriptor.triggers.keywords]
zh = ["玩了什么游戏", "游戏", "Steam", "游戏时长", "最近在玩"]
en = ["played", "game", "steam", "playtime", "gaming"]

[plugin.suggestion_descriptor.rationale]
zh = "magi 能看到你最近玩了什么游戏"
en = "Lets magi see what games you've been playing"

[[plugin.suggestion_descriptor.local_requirements]]
check_kind = "file_exists"

[plugin.suggestion_descriptor.local_requirements.paths_per_platform]
darwin = "~/Library/Application Support/Steam"
win32 = "%ProgramFiles(x86)%/Steam"
linux = "~/.steam/steam"

[[plugin.permissions.capabilities]]
capability = "filesystem_read"
scope = ["~/Library/Application Support/Steam", "C:\\Program Files (x86)\\Steam"]
reason_i18n = { en = "Read local Steam files to infer play sessions", "zh-CN" = "读取本地 Steam 文件以推断游戏时段" }
