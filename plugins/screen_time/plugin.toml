[plugin]
id = "screen-time"
name = "App Usage"
name_i18n = { "zh-CN" = "屏幕使用" }
version = "0.2.6"
description = "Tracks which apps you use and for how long, helping Magi understand your work focus, productivity patterns, and daily habits. Records are aggregated by clock hour, so the first entries appear on your timeline only after the current hour ends."
description_i18n = { "zh-CN" = "记录各应用的使用时长，帮助 Magi 了解你的工作专注情况、效率规律和日常使用习惯。数据按整点小时聚合，第一条记录会在当前所在的整点小时结束后才出现在时间线上。" }
author = "Magi Team"
entry_module = "plugin"
entry_class = "ScreenTimePlugin"
official = true
contribution_types = ["sensor"]
platforms = ["macos", "windows"]
dependencies = [
    "pyobjc-framework-Cocoa>=10.0; sys_platform == 'darwin'",
]

[plugin.default_settings.sensors.screen_time]
enabled = false
sync_interval_minutes = 5
[plugin.suggestion_descriptor]
category = "screen_context"
platform_support = ["darwin", "win32"]
setup_time_estimate_seconds = 10
data_locality = "local_only"

[plugin.suggestion_descriptor.triggers]
intents = []
entities = []

[plugin.suggestion_descriptor.triggers.keywords]
zh = ["屏幕时间", "用了多久", "用了哪些 app", "使用时长", "玩手机"]
en = ["screen time", "app usage", "how long", "usage"]

[plugin.suggestion_descriptor.rationale]
zh = "magi 能看到你的屏幕使用情况"
en = "Lets magi see your screen-time usage"

[[plugin.permissions.capabilities]]
capability = "filesystem_read"
scope = ["~/Library/Application Support/Knowledge"]
reason_i18n = { en = "Read the local app-usage data source", "zh-CN" = "读取本地应用用量数据源" }
