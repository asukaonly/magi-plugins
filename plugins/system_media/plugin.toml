[plugin]
id = "system-media"
name = "Local Now Playing"
name_i18n = { "zh-CN" = "本机正在播放" }
icon = "lucide:music"
version = "0.1.2"
description = "Records music currently playing on this device through system media controls."
description_i18n = { "zh-CN" = "通过系统媒体控制记录本机正在播放的音乐" }
author = "Magi Team"
entry_module = "plugin"
entry_class = "SystemMediaPlugin"
official = true
contribution_types = ["sensor"]
platforms = ["windows", "macos"]
dependencies = [
    "winrt-runtime>=2.0; sys_platform == 'win32'",
    "winrt-Windows.Media.Control>=2.0; sys_platform == 'win32'",
]

[plugin.display_group]
id = "listening_history"
name = "Listening History"
name_i18n = { "zh-CN" = "听歌历史" }
description = "Manage music listening history sources from installed music plugins."
description_i18n = { "zh-CN" = "统一管理听歌历史入口。" }
icon = "lucide:music"
order = 30
member_label = "Local Now Playing"
member_label_i18n = { "zh-CN" = "本机正在播放" }
member_order = 20

[plugin.default_settings.sensors.system_media]
enabled = false
sync_interval_minutes = 1
min_session_seconds = 30
pause_timeout_seconds = 300
[plugin.suggestion_descriptor]
category = "media"
platform_support = ["darwin", "win32"]
setup_time_estimate_seconds = 5
data_locality = "local_only"

[plugin.suggestion_descriptor.triggers]
intents = []
entities = []

[plugin.suggestion_descriptor.triggers.keywords]
zh = ["在播放", "正在听", "听歌", "播放了什么", "音乐"]
en = ["playing", "now playing", "music", "listening", "song"]

[plugin.suggestion_descriptor.rationale]
zh = "magi 能看到本机正在播放的音乐"
en = "Lets magi see music playing on this device"

[[plugin.permissions.capabilities]]
capability = "system_media"
reason_i18n = { en = "Read system media playback (now-playing) info", "zh-CN" = "读取系统媒体播放（正在播放）信息" }
