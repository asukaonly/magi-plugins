[plugin]
id = "local-documents"
name = "Local Documents"
name_i18n = { "zh-CN" = "本地文档" }
version = "0.1.0"
description = "Optional. Reads local Markdown and text documents from folders you choose so Magi can connect your notes and written work to the rest of your memory."
description_i18n = { "zh-CN" = "可选。读取你指定文件夹中的本地 Markdown 和文本类文档，让 Magi 把你的笔记和写作内容接入记忆。" }
author = "Magi Team"
entry_module = "plugin"
entry_class = "LocalDocumentsPlugin"
official = true
data_locality = "local_only"
contribution_types = ["sensor"]
platforms = ["macos", "windows", "linux"]

[plugin.default_settings.sensors.local_documents]
enabled = false
root_paths = []
include_extensions = [".md", ".markdown", ".txt", ".text", ".rst", ".org", ".log"]
exclude_folders = [".git", ".hg", ".svn", ".DS_Store", "__pycache__", ".mypy_cache", ".pytest_cache", "node_modules", ".venv", "venv"]
cognition_exclude_folders = ["References", "Archive", "Clippings"]
max_file_bytes = 1000000
max_body_chars = 50000
sync_mode = "interval"
sync_interval_minutes = 10
initial_sync_configured = false

[plugin.suggestion_descriptor]
category = "notes"
platform_support = ["darwin", "win32", "linux"]
setup_time_estimate_seconds = 20
data_locality = "local_only"

[plugin.suggestion_descriptor.triggers]
intents = []
entities = []

[plugin.suggestion_descriptor.triggers.keywords]
zh = ["笔记", "文档", "本地文件", "markdown", "txt", "写过", "记录"]
en = ["notes", "documents", "local files", "markdown", "txt", "wrote", "recorded"]

[plugin.suggestion_descriptor.rationale]
zh = "magi 能读取你指定文件夹里的本地笔记和文档"
en = "Lets magi read local notes and documents from folders you choose"

[[plugin.permissions.capabilities]]
capability = "filesystem_read"
reason_i18n = { en = "Read local document folders selected by the user", "zh-CN" = "读取用户选择的本地文档文件夹" }

