[plugin]
id = "chrome-history"
name = "Chrome History"
name_i18n = { "zh-CN" = "Chrome 浏览历史" }
version = "0.1.0"
description = "Reads your local Chrome browsing history so Magi can understand your interests, research habits, and frequently visited sites."
description_i18n = { "zh-CN" = "读取本地 Chrome 浏览记录，帮助 Magi 了解你的兴趣方向、研究习惯和常访站点" }
author = "Magi Team"
entry_module = "plugin"
entry_class = "ChromeHistoryPlugin"
official = true
contribution_types = ["sensor"]
platforms = ["macos", "windows"]

[plugin.default_settings.sensors.chrome_history]
enabled = false
sync_mode = "interval"
sync_interval_minutes = 30
default_retention_mode = "analyze_only"
storage_mode = "managed"
profile = "Default"
lookback_hours = 24
max_items_per_sync = 1000
edge_whitelist = ["VISITED", "VIEWED"]

[plugin.suggestion_descriptor]
category = "browser_history"
platform_support = ["darwin", "win32"]
setup_time_estimate_seconds = 10
data_locality = "local_only"

[plugin.suggestion_descriptor.triggers]
intents = []
entities = []

[plugin.suggestion_descriptor.triggers.keywords]
zh = ["浏览", "上网", "看过", "网页", "网站", "搜过", "查过"]
en = ["browsing", "browser", "website", "online", "bookmark", "browsed", "history"]

[plugin.suggestion_descriptor.rationale]
zh = "magi 能读取你的 Chrome 历史，帮你回想最近看过什么"
en = "Lets magi see what you've been reading in Chrome"

[[plugin.suggestion_descriptor.local_requirements]]
check_kind = "file_exists"

[plugin.suggestion_descriptor.local_requirements.paths_per_platform]
darwin = "~/Library/Application Support/Google/Chrome/Default/History"
win32 = "%LOCALAPPDATA%/Google/Chrome/User Data/Default/History"
