[plugin]
id = "chrome-history"
name = "Chrome History"
name_i18n = { "zh-CN" = "Chrome 浏览历史" }
version = "0.1.0"
description = "Reads your local Chrome browsing history so Magi can understand your interests, research habits, and frequently visited sites."
description_i18n = { "zh-CN" = "读取本地 Chrome 浏览记录，帮助 Magi 了解你的兴趣方向、研究习惯和常访站点" }
author = "Magi Team"
entry_module = "plugin"
entry_class = "ChromeHistoryPlugin"
official = true
contribution_types = ["sensor"]
platforms = ["macos", "windows"]

[plugin.default_settings.sensors.chrome_history]
enabled = false
sync_mode = "interval"
sync_interval_minutes = 30
default_retention_mode = "analyze_only"
storage_mode = "managed"
profile = "Default"
lookback_hours = 24
max_items_per_sync = 1000
edge_whitelist = ["VISITED", "VIEWED"]
