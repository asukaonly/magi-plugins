[plugin]
id = "safari-history"
name = "Safari History"
name_i18n = { "zh-CN" = "Safari 浏览历史" }
version = "0.1.0"
description = "Reads your local Safari browsing history so Magi can understand your interests, research habits, and frequently visited sites."
description_i18n = { "zh-CN" = "读取本地 Safari 浏览记录，帮助 Magi 了解你的兴趣方向、研究习惯和常访站点" }
author = "Magi Team"
entry_module = "plugin"
entry_class = "SafariHistoryPlugin"
official = true
contribution_types = ["sensor"]
depends_on = ["browser_history_core"]
platforms = ["macos"]

[plugin.default_settings.sensors.safari_history]
enabled = false
sync_mode = "interval"
sync_interval_minutes = 30
default_retention_mode = "analyze_only"
storage_mode = "managed"
source_path = "~/Library/Safari"
profile = ""
merge_window_minutes = 30
max_items_per_sync = 1000
initial_sync_policy = "lookback_days"
initial_sync_lookback_days = 7
initial_sync_configured = false
filter_domains = []
filter_keywords = []

[plugin.suggestion_descriptor]
category = "browser_history"
platform_support = ["darwin"]
setup_time_estimate_seconds = 10
data_locality = "local_only"

[plugin.suggestion_descriptor.triggers]
intents = []
entities = []

[plugin.suggestion_descriptor.triggers.keywords]
zh = ["浏览", "上网", "看过", "网页", "网站", "搜过", "查过", "Safari"]
en = ["browsing", "browser", "website", "online", "bookmark", "browsed", "history", "safari"]

[plugin.suggestion_descriptor.rationale]
zh = "magi 能读取你的 Safari 历史，帮你回想最近看过什么"
en = "Lets magi see what you've been reading in Safari"

[[plugin.suggestion_descriptor.local_requirements]]
check_kind = "file_exists"

[plugin.suggestion_descriptor.local_requirements.paths_per_platform]
darwin = "~/Library/Safari/History.db"

[[plugin.permissions.capabilities]]
capability = "filesystem_read"
scope = ["~/Library/Safari"]
reason_i18n = { en = "Read the local Safari history database", "zh-CN" = "读取本地 Safari 历史数据库" }

