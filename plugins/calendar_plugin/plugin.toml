[plugin]
id = "calendar"
name = "Calendar"
name_i18n = { "zh-CN" = "日历" }
version = "0.1.1"
description = "Reads your calendar events and reminders so Magi can understand your schedule, meetings, and daily plans."
description_i18n = { "zh-CN" = "读取日历中的事件和提醒，帮助 Magi 了解你的日程安排、会议记录和每日计划" }
author = "Magi Team"
entry_module = "plugin"
entry_class = "CalendarPlugin"
official = true
contribution_types = ["sensor"]
platforms = ["macos"]
dependencies = [
    "pyobjc-framework-EventKit>=10.0",
    "pyobjc-framework-Cocoa>=10.0",
]
