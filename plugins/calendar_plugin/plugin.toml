[plugin]
id = "calendar"
name = "Calendar"
name_i18n = { "zh-CN" = "日历" }
version = "0.1.1"
description = "Reads your calendar events and reminders so Magi can understand your schedule, meetings, and daily plans."
description_i18n = { "zh-CN" = "读取日历中的事件和提醒，帮助 Magi 了解你的日程安排、会议记录和每日计划" }
author = "Magi Team"
entry_module = "plugin"
entry_class = "CalendarPlugin"
official = true
contribution_types = ["sensor"]
platforms = ["macos"]
dependencies = [
    "pyobjc-framework-EventKit>=10.0",
    "pyobjc-framework-Cocoa>=10.0",
]

[plugin.default_settings.sensors.calendar]
enabled = false
sync_mode = "interval"
sync_interval_minutes = 30
lookback_days = 30
recurring_expansion_days = 30
default_retention_mode = "full"

[plugin.suggestion_descriptor]
category = "calendar"
platform_support = ["darwin"]
setup_time_estimate_seconds = 10
data_locality = "local_only"

[plugin.suggestion_descriptor.triggers]
intents = []
entities = []

[plugin.suggestion_descriptor.triggers.keywords]
zh = ["日程", "日历", "会议", "安排", "约见", "提醒", "什么时候"]
en = ["calendar", "schedule", "meeting", "appointment", "reminder", "agenda"]

[plugin.suggestion_descriptor.rationale]
zh = "magi 能看到你的日程，回答'我今天有什么会'这类问题"
en = "Lets magi see what's on your calendar"

[[plugin.suggestion_descriptor.local_requirements]]
check_kind = "file_exists"

[plugin.suggestion_descriptor.local_requirements.paths_per_platform]
darwin = "~/Library/Calendars"

[[plugin.permissions.capabilities]]
capability = "calendar"
reason_i18n = { en = "Read your calendar events and reminders", "zh-CN" = "读取你的日历事件与提醒事项" }

[[plugin.permissions.capabilities]]
capability = "filesystem_read"
scope = ["~/Library/Calendars"]
reason_i18n = { en = "Parse the local calendar store", "zh-CN" = "解析本地日历数据" }
